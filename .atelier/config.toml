schema = "atelier.project_config"
schema_version = 1
project_slug = "atelier"
compatibility_state_root = ".atelier-state"

[paths]
state_root = ".atelier"
runtime_dir = ".atelier/runtime"
runtime_database = ".atelier/runtime/state.db"
cache_dir = ".atelier/cache"

# Review provider integration uses an environment variable for the admin token;
# the token value must not be committed.
[review]
mode = "provider"
provider = "forgejo"

[review.providers.forgejo]
host = "http://iiot-grand-central.cisco.com:3000"
owner = "supadava"
repo = "atelier"
admin_token_env = "FORGEJO_ADMIN_TOKEN"
