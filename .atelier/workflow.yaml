schema: atelier.workflow
schema_version: 3

branch_policy:
  base_branch: master
  merge_strategy: squash

issue_types:
  bug: { label: Bug }
  epic: { label: Epic }
  feature: { label: Feature }
  mission: { label: Mission }
  spike: { label: Spike }
  task: { label: Task }
  validation: { label: Validation }

statuses:
  draft:
    category: todo
  ready:
    category: todo
  todo:
    category: todo
  in_progress:
    category: active
    role: worker
  blocked:
    category: blocked
  review:
    category: active
    role: reviewer
  validation:
    category: active
    role: validator
  done:
    category: done
  closed:
    category: done
  superseded:
    category: done

workflows:
  mission_delivery:
    applies_to: [mission]
    initial_status: draft
    done_statuses: [closed, superseded]
    transitions:
      ready:
        from: [draft]
        to: ready
        description: "Move a mission from drafted planning into ready execution when the Outcome is worker-usable."
        validators:
          - issue.sections_parseable
      start:
        from: [ready]
        to: in_progress
        description: "Start mission execution after the configured repository baseline is green or explicitly waived."
        validators:
          - baseline.default_checks
          - git.on_base
        actions:
          - git.prepare_branch
      close:
        from: [ready, in_progress, validation]
        to: closed
        required_fields: [close_reason]
        description: "Closing requires configured objective validators to pass."
        validators:
          - objective.work_present
          - objective.work_terminal
          - objective.blockers_none_open
          - issue.sections_parseable
          - validation.criteria_satisfied
          - closeout.failures_classified
          - lint.none_blocking
          - command_surface_current
          - ignored_tests_reviewed
          - git.on_base
          - git.worktree_clean

  task_delivery:
    applies_to: [bug, feature, task]
    initial_status: todo
    done_statuses: [done]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
        description: "Start active work on this item."
        actions:
          - git.prepare_branch
      block:
        from: [todo, in_progress, validation]
        to: blocked
        description: "Mark work blocked while preserving current proof expectations."
      close:
        from: [in_progress, validation]
        to: done
        required_fields: [close_reason]
        description: "Closing requires attached evidence and no open blockers."
        validators:
          - evidence.attached: { min_count: 1 }
          - blockers.none_open
          - lint.none_blocking

  epic_delivery:
    applies_to: [epic]
    initial_status: todo
    done_statuses: [done]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
        description: "Start active work on this item."
        validators:
          - git.on_mission_branch
        actions:
          - git.prepare_branch: current
      block:
        from: [todo, in_progress, review, validation]
        to: blocked
        description: "Mark work blocked while preserving current proof expectations."
      request_review:
        from: [in_progress]
        to: review
        description: "Open the configured review artifact for this work."
        actions:
          - review.open:
              provider: forgejo
              role: worker
              role_authors:
                worker: atelier-worker
                reviewer: atelier-reviewer
                validator: atelier-validator
                manager: atelier-manager
      request_validation:
        from: [in_progress, review]
        to: validation
        description: "Move reviewed work into validation after review is complete."
        validators:
          - review.complete
      close:
        from: [validation]
        to: done
        description: "Closing requires attached evidence, complete child proof, validation, review merge, and a clean worktree."
        validators:
          - evidence.attached: { min_count: 1 }
          - children.proof_complete
          - blockers.none_open
          - lint.none_blocking
          - git.worktree_clean
        actions:
          - tracker.commit
          - git.push
          - review.merge
          - git.sync

  validation_delivery:
    applies_to: [validation]
    initial_status: todo
    done_statuses: [done]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
        description: "Start active work on this item."
        actions:
          - git.prepare_branch
      block:
        from: [todo, in_progress, review, validation]
        to: blocked
        description: "Mark work blocked while preserving current proof expectations."
      request_review:
        from: [in_progress]
        to: review
        description: "Open the configured review artifact for this work."
        actions:
          - review.open:
              provider: forgejo
              role: worker
              role_authors:
                worker: atelier-worker
                reviewer: atelier-reviewer
                validator: atelier-validator
                manager: atelier-manager
      request_validation:
        from: [in_progress, review]
        to: validation
        description: "Move reviewed work into validation after review is complete."
        validators:
          - review.complete
      close:
        from: [validation]
        to: done
        description: "Closing requires attached evidence, complete child proof, review merge, and a clean worktree."
        validators:
          - evidence.attached: { min_count: 1 }
          - children.proof_complete
          - blockers.none_open
          - lint.none_blocking
          - git.worktree_clean
        actions:
          - tracker.commit
          - git.push
          - review.merge
          - git.sync

  spike_review:
    applies_to: [spike]
    initial_status: todo
    done_statuses: [done]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
        description: "Start active work on this item."
        actions:
          - git.prepare_branch
      block:
        from: [todo, in_progress, review]
        to: blocked
        description: "Mark spike work blocked while preserving review expectations."
      request_review:
        from: [in_progress]
        to: review
        description: "Open the configured review artifact for this spike."
        actions:
          - review.open:
              provider: forgejo
              role: worker
              role_authors:
                worker: atelier-worker
                reviewer: atelier-reviewer
                validator: atelier-validator
                manager: atelier-manager
      revise:
        from: [review]
        to: in_progress
        description: "Return a reviewed spike to active work."
      close:
        from: [review]
        to: done
        description: "Closing requires complete review."
        validators:
          - review.complete
