schema: atelier.workflow
schema_version: 3

branch_policy:
  base_branch: master
  merge_strategy: squash
  branch_templates:
    epic: epic/{{ issue.id }}
    issue: codex/{{ issue.id }}

statuses:
  todo:
    category: todo
  in_progress:
    category: active
  blocked:
    category: blocked
  review:
    category: review
  validation:
    category: validation
  done:
    category: done
  archived:
    category: done

workflows:
  standard:
    applies_to: [bug, feature, task]
    initial_status: todo
    done_statuses: [done, archived]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
      block:
        from: [todo, in_progress, validation]
        to: blocked
      close:
        from: [in_progress, validation]
        to: done
        required_fields: [close_reason]
        description: "Closing requires attached evidence and no open blockers."
        validators:
          - evidence_attached: { min_count: 1 }
          - no_open_blockers
          - no_blocking_lints
          - durable_state_current

  epic_reviewed:
    applies_to: [epic]
    initial_status: todo
    done_statuses: [done, archived]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
      block:
        from: [todo, in_progress, review, validation]
        to: blocked
      request_review:
        from: [in_progress]
        to: review
        actions:
          - review_artifact_open:
              provider: forgejo
              role: worker
              role_authors:
                worker: atelier-worker
                reviewer: atelier-reviewer
                validator: atelier-validator
                manager: atelier-manager
      request_validation:
        from: [in_progress, review]
        to: validation
        validators:
          - review_complete
      close:
        from: [validation]
        to: done
        description: "Closing requires attached evidence, complete child proof, validation, review merge, and a clean worktree."
        validators:
          - evidence_attached: { min_count: 1 }
          - epic_child_proof_complete
          - no_open_blockers
          - no_blocking_lints
          - durable_state_current
          - git_worktree_clean

  validation_reviewed:
    applies_to: [validation]
    initial_status: todo
    done_statuses: [done, archived]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
      block:
        from: [todo, in_progress, review, validation]
        to: blocked
      request_review:
        from: [in_progress]
        to: review
        actions:
          - review_artifact_open:
              provider: forgejo
              role: worker
              role_authors:
                worker: atelier-worker
                reviewer: atelier-reviewer
                validator: atelier-validator
                manager: atelier-manager
      request_validation:
        from: [in_progress, review]
        to: validation
        validators:
          - review_complete
      close:
        from: [validation]
        to: done
        description: "Closing requires attached evidence, complete child proof, review merge, and a clean worktree."
        validators:
          - evidence_attached: { min_count: 1 }
          - epic_child_proof_complete
          - no_open_blockers
          - no_blocking_lints
          - durable_state_current
          - git_worktree_clean

  spike:
    applies_to: [spike]
    initial_status: todo
    done_statuses: [done]
    transitions:
      start:
        from: [todo, blocked]
        to: in_progress
      block:
        from: [todo, in_progress, review]
        to: blocked
      request_review:
        from: [in_progress]
        to: review
      revise:
        from: [review]
        to: in_progress
      close:
        from: [review]
        to: done
        description: "Closing requires a complete review."
        validators:
          - review_complete
          - durable_state_current
